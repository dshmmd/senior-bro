name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: senior
          POSTGRES_PASSWORD: senior
          POSTGRES_DB: senior_bro
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U senior -d senior_bro"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://senior:senior@localhost:5433/senior_bro
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:guardrail
      - run: npm run smoke
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
